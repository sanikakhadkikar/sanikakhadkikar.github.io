{{ $src := .Get "src" }}
{{ if not $src }}
  <p style="color: rgba(255,255,255,0.7);">Model viewer requires a <code>src</code> parameter.</p>
{{ else }}
  {{ if not (.Page.Scratch.Get "model-viewer-script") }}
    {{ .Page.Scratch.Set "model-viewer-script" true }}
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <script nomodule src="https://unpkg.com/@google/model-viewer/dist/model-viewer-legacy.js"></script>
  {{ end }}
  <div class="model-viewer-block" style="margin: 2rem 0;">
    <model-viewer
      src="{{ $src }}"
      alt="{{ .Get "alt" | default "3D model" }}"
      camera-controls
      exposure="{{ .Get "exposure" | default "0.9" }}"
      shadow-intensity="{{ .Get "shadow" | default "1" }}"
      loading="{{ .Get "loading" | default "lazy" }}"
      reveal="{{ .Get "reveal" | default "interaction" }}"
      {{ with .Get "camera_orbit" }}camera-orbit="{{ . }}"{{ end }}
      {{ with .Get "min_camera_orbit" }}min-camera-orbit="{{ . }}"{{ end }}
      {{ with .Get "max_camera_orbit" }}max-camera-orbit="{{ . }}"{{ end }}
      {{ with .Get "camera_target" }}camera-target="{{ . }}"{{ end }}
      {{ with .Get "field_of_view" }}field-of-view="{{ . }}"{{ end }}
      {{ with .Get "environment_image" }}environment-image="{{ . }}"{{ end }}
      {{ with .Get "skybox_image" }}skybox-image="{{ . }}"{{ end }}
      {{ with .Get "tone_mapping" }}tone-mapping="{{ . }}"{{ end }}
      {{ with .Get "shadow_softness" }}shadow-softness="{{ . }}"{{ end }}
      {{ if .Get "auto_rotate" }}auto-rotate{{ end }}
      {{ if .Get "autoplay" }}autoplay{{ end }}
      style="width: 100%; height: {{ .Get "height" | default "520px" }}; border-radius: 20px; background: radial-gradient(circle at top, rgba(255,255,255,0.15), rgba(9,12,20,0.9));"
    ></model-viewer>
    {{ with .Get "caption" }}
      <p style="margin-top: 0.75rem; color: rgba(255,255,255,0.75); font-size: 0.95rem;">{{ . }}</p>
    {{ end }}
  </div>
{{ end }}
